<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <style>
      body {
        min-width: 280px;
        margin: 0;
        padding: 14px;
        font-family: system-ui, sans-serif;
      }

      h3 {
        margin: 0 0 12px;
        font-size: 16px;
      }

      label {
        display: block;
        margin-bottom: 6px;
        font-size: 13px;
      }

      input {
        box-sizing: border-box;
        width: 100%;
        min-height: 34px;
        margin-bottom: 10px;
        padding: 6px 8px;
        border: 1px solid #b9c1cc;
        border-radius: 6px;
        font: inherit;
      }

      button {
        width: 100%;
        min-height: 34px;
        border: 1px solid #b9c1cc;
        border-radius: 6px;
        background: #f6f8fa;
        cursor: pointer;
        font: inherit;
      }

      button:disabled {
        cursor: wait;
        opacity: 0.7;
      }

      #copy-results {
        margin-top: 8px;
        background: #166534;
        border-color: #166534;
        color: #ffffff;
      }

      #job-status {
        margin-top: 10px;
        color: #475569;
        font-size: 12px;
      }

      #error-message {
        min-height: 18px;
        margin-top: 8px;
        color: #b91c1c;
        font-size: 12px;
      }

    </style>
  </head>
  <body>
    <h3>Alza Scraper</h3>
    <label for="worker-name">Worker name</label>
    <input id="worker-name" type="text" autocomplete="name">
    <button id="scrape">Scrape category</button>
    <button id="copy-results" type="button" hidden>Copy Excel rows</button>
    <div id="job-status"></div>
    <div id="error-message" role="alert"></div>
    <script src="popup.js"></script>
  </body>
</html>
