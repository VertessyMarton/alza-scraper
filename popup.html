<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <style>
      body {
        min-width: 280px;
        margin: 0;
        padding: 14px;
        font-family: system-ui, sans-serif;
      }

      h3 {
        margin: 0 0 12px;
        font-size: 16px;
      }

      button {
        width: 100%;
        min-height: 34px;
        border: 1px solid #b9c1cc;
        border-radius: 6px;
        background: #f6f8fa;
        cursor: pointer;
        font: inherit;
      }

      button:disabled {
        cursor: wait;
        opacity: 0.7;
      }

    </style>
  </head>
  <body>
    <h3>Alza Scraper</h3>
    <button id="scrape">Scrape category</button>
    <script src="popup.js"></script>
  </body>
</html>
